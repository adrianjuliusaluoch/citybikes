name: Collect CityBikes Data

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

concurrency:
  group: citybikes-job
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas requests gspread google-auth

      - name: Run script
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          for i in {1..6}; do
            echo "Run $i at $(date)"
            python script.py
            echo "Sleeping for 5 minutes..."
            sleep 300
          done
